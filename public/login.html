<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - NIDS Enterprise</title>
  <link rel="stylesheet" href="/styles.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg-primary); }
    .login-container { width: 380px; }
    .login-header { text-align: center; margin-bottom: 32px; }
    .login-header h1 { font-size: 22px; color: var(--text-primary); margin-bottom: 4px; }
    .login-header .subtitle { font-size: 12px; color: var(--text-secondary); }
    .login-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 28px; }
    .login-error { background: rgba(248,81,73,0.1); border: 1px solid rgba(248,81,73,0.3); color: var(--accent-red); padding: 10px 14px; border-radius: 6px; font-size: 12px; margin-bottom: 16px; display: none; }
    .login-btn { width: 100%; padding: 12px; font-size: 14px; margin-top: 8px; }
    .login-footer { text-align: center; margin-top: 16px; font-size: 11px; color: var(--text-muted); }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; margin-bottom: 6px; font-size: 12px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.3px; }
    .form-group input { width: 100%; padding: 10px 12px; background: var(--bg-primary); border: 1px solid var(--border); border-radius: 6px; color: var(--text-primary); font-size: 14px; outline: none; transition: border-color 0.15s; }
    .form-group input:focus { border-color: var(--accent-blue); }
    .version { text-align: center; margin-top: 24px; font-size: 11px; color: var(--text-muted); }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <h1>&#9879; NIDS Enterprise</h1>
      <div class="subtitle">Network Intrusion Detection System — SOC Platform</div>
    </div>
    <div class="login-card">
      <div class="login-error" id="loginError"></div>
      <form id="loginForm" autocomplete="off">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Enter your username" value="admin" required autofocus>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password" value="admin" required>
        </div>
        <button type="submit" class="btn btn-primary login-btn" id="loginBtn">Sign In</button>
      </form>
    </div>
    <div class="login-footer">Authorized personnel only. All access is audited.</div>
    <div class="version">NIDS Enterprise v1.0</div>
  </div>

  <script>
    if (!localStorage.getItem('cookies_accepted')) {
      const banner = document.createElement('div');
      banner.className = 'cookie-banner';
      banner.innerHTML = '<p>This site uses cookies for authentication and security purposes. By continuing, you consent to our use of cookies.</p><button class="btn btn-primary" id="cookieAccept">Accept</button>';
      document.body.appendChild(banner);
      document.getElementById('cookieAccept').onclick = () => {
        localStorage.setItem('cookies_accepted', 'true');
        banner.remove();
      };
    }

    function showLoading(msg) {
      const el = document.createElement('div');
      el.className = 'loading-overlay';
      el.id = 'loginLoading';
      el.innerHTML = `<div class="loading-spinner"></div><div class="loading-text">${msg}&#8230;</div>`;
      document.body.appendChild(el);
    }
    function hideLoading() {
      const el = document.getElementById('loginLoading');
      if (el) { el.classList.add('hidden'); setTimeout(() => el.remove(), 300); }
    }

    document.getElementById('loginForm').onsubmit = async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const errorEl = document.getElementById('loginError');
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      btn.disabled = true;
      btn.textContent = 'Signing in...';
      errorEl.style.display = 'none';
      showLoading('Signing in');

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({ error: 'Invalid credentials' }));
          throw new Error(err.error || 'Invalid credentials');
        }

        const data = await res.json();
        localStorage.setItem('nids_token', data.token);
        localStorage.setItem('nids_user', JSON.stringify(data.user));
        window.location.href = '/';
      } catch (err) {
        hideLoading();
        errorEl.textContent = err.message;
        errorEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    };
  </script>
</body>
</html>
